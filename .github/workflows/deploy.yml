name: Deploy to GCP VM

on:
  push:
    branches: [main]

env:
  PROJECT_DIR: /opt/img_convert

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH and Deploy
        run: |
          # 1. 建立 SSH 目錄並寫入私鑰
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. 將 GCP VM 加入已知主機，防止 Host verification 錯誤
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts
          
          # 3. 透過原生 SSH 執行部署指令
          # 注意：我們使用 -i 指定剛剛產生的 id_rsa
          ssh -i ~/.ssh/id_rsa ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} << 'EOF'
            set -e  # 遇到錯誤立即停止
            
            # 確保目錄存在並處理權限
            sudo mkdir -p ${{ env.PROJECT_DIR }}
            sudo chown -R $USER:$USER ${{ env.PROJECT_DIR }}

            # 處理 Git 操作
            if [ -d "${{ env.PROJECT_DIR }}/.git" ]; then
              cd ${{ env.PROJECT_DIR }}
              git reset --hard HEAD
              git pull origin main
            else
              ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
              git clone --branch main --single-branch git@github.com:MiipisSus/Img_converter.git ${{ env.PROJECT_DIR }}
              cd ${{ env.PROJECT_DIR }}
            fi

            # Docker 部署
            docker compose down --remove-orphans
            docker compose up --build -d
            
            # 清理沒在用的 image
            docker image prune -f
          EOF