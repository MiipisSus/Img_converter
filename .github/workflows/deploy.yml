name: Deploy to GCP VM

on:
  push:
    branches: [main]

env:
  PROJECT_DIR: /opt/img_convert

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH and Deploy
        run: |
          # 1. 建立 SSH 目錄並寫入私鑰
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. 掃描 Host Key 避免連線中斷
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts
          
          # 3. 執行遠端指令 (改用更明確的引號處理)
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} << 'EOF'
            set -e
            
            # 定義變數 (在遠端執行環境中)
            PROJECT_DIR="/opt/img_convert"
            
            echo "--- Starting Deployment on VM ---"
            
            # 確保目錄權限
            sudo mkdir -p $PROJECT_DIR
            sudo chown -R $USER:$USER $PROJECT_DIR

            # 處理 Git 操作
            if [ -d "$PROJECT_DIR/.git" ]; then
              cd $PROJECT_DIR
              git reset --hard HEAD
              git pull origin main
            else
              # 確保 VM 能認得 GitHub
              ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
              git clone --branch main --single-branch git@github.com:MiipisSus/Img_converter.git $PROJECT_DIR
              cd $PROJECT_DIR
            fi

            # Docker 部署
            echo "--- Restarting Containers ---"
            docker compose down --remove-orphans
            docker compose up --build -d
            
            # 清理
            docker image prune -f
            
            echo "--- Deployment Finished Successfully ---"
          EOF